<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake &mdash; VOTD Games</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="snake-page">
    <div class="game-container">
        <!-- Cockpit header bar -->
        <div class="cockpit-header">
            <a href="./index.html" class="back-link">&larr; MENU</a>
            <div class="cockpit-title">
                <span class="cockpit-flicker">SYS</span>://SNAKE
            </div>
            <div class="cockpit-score">
                SCORE: <span id="score" class="score-value">0</span>
            </div>
        </div>

        <!-- Game viewport -->
        <div class="game-viewport">
            <div class="scanlines"></div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="viewport-corner tl"></div>
            <div class="viewport-corner tr"></div>
            <div class="viewport-corner bl"></div>
            <div class="viewport-corner br"></div>
        </div>

        <!-- Controls bar -->
        <div class="cockpit-controls">
            <span class="control-hint">[ARROWS] NAVIGATE</span>
            <span class="control-divider">&bull;</span>
            <span class="control-hint">[SPACE] RESTART</span>
        </div>

        <!-- Game over overlay -->
        <div class="game-over" id="gameOver">
            <div class="game-over-inner">
                <div class="game-over-glitch" data-text="GAME OVER">GAME OVER</div>
                <p class="game-over-score">FINAL SCORE: <span id="finalScore">0</span></p>
                <button onclick="restartGame()">RESTART MISSION</button>
            </div>
        </div>
    </div>

    <script src="./assets/snake.js"></script>
</body>
</html>
