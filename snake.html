<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake &mdash; The Games Library</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="paper-bg">
    <div class="game-container">
        <div class="terminal-header">
            <div class="terminal-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="terminal-title">Chapter I &mdash; Snake</div>
        </div>
        <div class="terminal-body">
            <a href="./index.html" class="back-link">&larr; Back to the Library</a>
            <h1>Snake</h1>
            <div class="score">Score: <span id="score">0</span></div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="controls">Arrow Keys to move &middot; Space to restart</div>
            <div class="prompt"><span class="cursor"></span></div>
        </div>
        <div class="game-over" id="gameOver">
            <h2>The End</h2>
            <p style="font-size: 1.4em; margin-bottom: 20px;">Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Read Again</button>
        </div>
    </div>

    <script src="./assets/snake.js"></script>
</body>
</html>
